# ===========================================
# NGINX CONFIG - C0NTROL
# Configuração para VPS com SSL (Certbot)
# ===========================================

# BLOCO HTTP (Porta 80)
# Serve para validação do Certbot e redirecionar para HTTPS
server {
    listen 80;
    server_name c0ntrol.seudominio.com.br;

    # Validação do Certbot para renovações automáticas
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redireciona todo o tráfego para HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# BLOCO HTTPS (Porta 443)
# Onde a aplicação realmente roda
server {
    listen 443 ssl http2;
    server_name c0ntrol.seudominio.com.br;

    # Certificados SSL (gerados pelo Certbot)
    ssl_certificate /etc/letsencrypt/live/c0ntrol.seudominio.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/c0ntrol.seudominio.com.br/privkey.pem;

    # Configurações de SSL recomendadas
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Limite de upload (para importação de Excel)
    client_max_body_size 50M;

    # Proxy para a aplicação Next.js
    location / {
        proxy_pass http://c0ntrol_app:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
